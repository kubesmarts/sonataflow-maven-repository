name: Build and publish SonataFlow jars to the GitHub Maven Repository
on:
  workflow_dispatch:
    inputs:
      SONATAFLOW_VERSION:
        description: "Sonataflow version to be built and published."
        type: string
        required: false
        default: 111-SNAPSHOT
      GITHUB_ORGANISATION:
        description: "GitHub organisation that contains the SonataFlow repositories."
        type: string
        required: false
        default: kiegroup
      GITHUB_ORGANISATION_KIE_TOOLS:
        description: "GitHub organisation that contains the SonataFlow kie-tools repository."
        type: string
        required: false
        default: kubesmarts
      BRANCH_TO_BUILD:
        description: "Branch from which the artifacts should be published."
        type: string
        required: false
        default: main
      MAVEN_REPOSITORY_URL:
        description: "URL of the Maven repository where artifacts will be deployed."
        type: string
        required: false
        default: https://maven.pkg.github.com/kubesmarts/sonataflow-maven-repository
# TODO - Implement optional tests execution
#      RUN_TESTS:
#        description: "If true, also tests will be run. "
#        type: boolean
#        required: false
#        default: false

env:
  MAVEN_REPOSITORY_URL: ${{ inputs.MAVEN_REPOSITORY_URL }}
  GITHUB_USERNAME: ${{ inputs.GITHUB_ORGANISATION }}

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Checkout Drools
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.GITHUB_ORGANISATION }}/drools
          path: drools
          ref: ${{ inputs.BRANCH_TO_BUILD }}

      - name: Checkout kogito-runtimes
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.GITHUB_ORGANISATION }}/kogito-runtimes
          path: kogito-runtimes
          ref: ${{ inputs.BRANCH_TO_BUILD }}

      - name: Checkout kogito-apps
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.GITHUB_ORGANISATION }}/kogito-apps
          path: kogito-apps
          ref: ${{ inputs.BRANCH_TO_BUILD }}

      - name: Checkout kubesmarts/kie-tools
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.GITHUB_ORGANISATION_KIE_TOOLS }}/kie-tools
          path: kie-tools
          ref: ${{ inputs.BRANCH_TO_BUILD }}

      - name: Update Drools version and prepare repository
        run: |
          python3 ../scripts/version-update/update-maven-versions.py ${{ inputs.SONATAFLOW_VERSION }} --exclude "*/kie-ci-test-jars/*"
        working-directory: drools

      - name: Update kogito-runtimes version
        run: |
          python3 ../scripts/version-update/update-maven-versions.py ${{ inputs.SONATAFLOW_VERSION }}
        working-directory: kogito-runtimes

      - name: Update kogito-apps version
        run: |
          python3 ../scripts/version-update/update-maven-versions.py ${{ inputs.SONATAFLOW_VERSION }} --update-root-parent
        working-directory: kogito-apps

      - name: Update kie-tools version and prepare repository
        run: |
          python3 ../scripts/version-update/update-maven-versions.py ${{ inputs.SONATAFLOW_VERSION }} --exclude "*/maven-base/*" "*/serverless-logic-web-tools-swf-deployment-quarkus-app/*"
        working-directory: kie-tools

      - name: Update kie-tools maven-base
        run: |
          python3 ../../../scripts/version-update/update-maven-versions.py ${{ inputs.SONATAFLOW_VERSION }}
          sed -i 's|<version\.org\.kie\.kogito>.*</version\.org\.kie\.kogito>|<version.org.kie.kogito>${project.version}</version.org.kie.kogito>|g' ./pom.xml
        working-directory: kie-tools/packages/maven-base

      - name: Update kie-tools serverless-logic-web-tools-swf-deployment-quarkus-app
        run: |
          python3 ../../../scripts/version-update/update-maven-versions.py ${{ inputs.SONATAFLOW_VERSION }}
        working-directory: kie-tools/packages/serverless-logic-web-tools-swf-deployment-quarkus-app

      - name: Build and publish Drools artifacts
        run: mvn --batch-mode clean deploy -s ../.github/configs/settings.xml
        working-directory: drools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish kogito-runtimes artifacts
        run: mvn --batch-mode clean deploy -s ../.github/configs/settings.xml -DskipTests -Dversion.org.kie=${{ inputs.SONATAFLOW_VERSION }}
        working-directory: kogito-runtimes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish kogito-apps artifacts
        run: mvn --batch-mode clean deploy -s ../.github/configs/settings.xml -DskipTests -Dversion.org.kie=${{ inputs.SONATAFLOW_VERSION }}
        working-directory: kogito-apps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish kie-tools artifacts
        run: mvn --batch-mode clean deploy -s ${{ github.workspace }}/.github/configs/settings.xml -DskipTests -Drevision=${{ inputs.SONATAFLOW_VERSION }} -Dversion.org.kie.kogito=${{ inputs.SONATAFLOW_VERSION }} -Dskip.maven.deploy.in.pnpm.wrapped.artifacts=false
        working-directory: kie-tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_ARGS: --settings=${{ github.workspace }}/.github/configs/settings.xml -Drevision=${{ inputs.SONATAFLOW_VERSION }}
          KIE_TOOLS_BUILD__mavenDeploySkip: false
          DROOLS_AND_KOGITO__skip: true
          KIE_TOOLS_BUILD__runTests: false
          KIE_TOOLS_BUILD__runEndToEndTests: false
          KIE_TOOLS_BUILD__buildContainerImages: false
          KIE_TOOLS_BUILD__containerizedEndToEndTests: false
          KIE_TOOLS_BUILD__ignoreTestFailures: true
          KIE_TOOLS_BUILD__ignoreEndToEndTestFailures: true
          DROOLS_AND_KOGITO__droolsRepoUrl: https://github.com/kiegroup/drools
          DROOLS_AND_KOGITO__kogitoRuntimesRepoUrl: https://github.com/kiegroup/kogito-runtimes
          DROOLS_AND_KOGITO__kogitoAppsRepoUrl: https://github.com/kiegroup/kogito-apps
